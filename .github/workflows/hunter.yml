name: Real-time Hunter

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min — GitHub may delay 5-15 min under load
  workflow_dispatch:

# Prevent overlap with any workflow that writes data/seen.json.
concurrency:
  group: pepper-seen-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm ci || npm i
      - run: npm run hunter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFIER: telegram
      - uses: stefanzweifel/git-auto-commit-action@v7
        id: auto-commit
        with:
          commit_message: 'chore: update seen.json (hunter)'
          file_pattern: data/seen.json
          skip_push: true
      - name: Rebase and push seen data
        if: steps.auto-commit.outputs.changes_detected == 'true'
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            git pull --rebase origin "$GITHUB_REF_NAME"
            if git push origin HEAD:"$GITHUB_REF_NAME"; then
              exit 0
            fi
            sleep $((attempt * 2))
          done
          exit 1
