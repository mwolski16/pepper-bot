name: Daily Digest

on:
  schedule:
    - cron: '0 18 * * *' # ~18:00 Poland — see `timezone` below (GitHub may delay a few minutes)
      timezone: Europe/Warsaw
  workflow_dispatch: # lets you trigger manually from Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit seen.json back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm i
      - run: npm run digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Omit when unset so the bot ranks live :free models from GET /api/v1/models (no stale pinned ID).
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          NOTIFIER: telegram
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update seen.json (digest)'
          file_pattern: data/seen.json
